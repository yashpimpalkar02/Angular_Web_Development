<div class="container my-5">
  <div class="text-center mb-4">
    <h1 class="display-6" style="color: #9b4fa5; font-weight: bold;">Contact Our</h1>
    <h2 class="fw-bold">Customer Support Center</h2>
  </div>

  <div class="text-center mb-4">
    <img
      src="https://img.freepik.com/premium-vector/businesman-laptop-screen-online-business-meeting-online-chat-online-communication-zoom-conference-laptop-screen-team-meeting-laptop-screen-cartoon-character-zoom-call-meeting-eps-10_564974-356.jpg?semt=ais_hybrid"
      class="img-fluid"
      alt="Laptop"
      style="max-width: 180px; display: inline-block;"
    />
  </div>

  <div class="card shadow-lg p-4">
    <h3 class="card-title text-center mb-3">Contact Information</h3>
    <p class="text-center text-muted">Please fill out your contact information below.</p>

    <form>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="firstName" class="form-label">First Name <span class="text-danger">*</span></label>
          <input type="text" id="firstName" class="form-control" placeholder="First Name" required />
        </div>
        
        <div class="col-md-6">
          <label for="lastName" class="form-label">Last Name <span class="text-danger">*</span></label>
          <input type="text" id="lastName" class="form-control" placeholder="Last Name" required />
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="example@domain.com" required />
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone <span class="text-danger">*</span></label>
        <input type="tel" id="phone" class="form-control" placeholder="123-456-7890" required />
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Address <span class="text-danger">*</span></label>
        <textarea id="address" class="form-control" rows="3" placeholder="Your Address" required></textarea>
      </div>

      <!-- Submit Button -->
      <div class="text-center">
        <button type="submit" class="btn btn-primary px-5">Submit</button>
      </div>
    </form>
  </div>
</div>
